<h2 mat-dialog-title>{{ esEdicion ? 'Editar Evento' : 'Nuevo Evento' }}</h2>

<mat-dialog-content>
  <form [formGroup]="eventoForm" style="padding-top: 10px;">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Título del Evento</mat-label>
      <input matInput formControlName="titulo" placeholder="Ej: Cata de Vinos">
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Fecha y Hora de Inicio</mat-label>
        <input matInput type="datetime-local" formControlName="fecha_inicio">
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Fecha y Hora de Fin</mat-label>
        <input matInput type="datetime-local" formControlName="fecha_fin">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción del Evento</mat-label>
      <textarea matInput formControlName="descripcion" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>URL de la Imagen de portada</mat-label>
      <input matInput formControlName="url_imagen">
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" style="padding-bottom: 20px; padding-right: 24px;">
  <button class="btn-modal-cancelar" (click)="cancelar()">Cancelar</button>
  <button class="btn-modal-accion" [disabled]="eventoForm.invalid" (click)="guardar()">
    {{ esEdicion ? 'Actualizar' : 'Publicar Evento' }}
  </button>
</mat-dialog-actions>
