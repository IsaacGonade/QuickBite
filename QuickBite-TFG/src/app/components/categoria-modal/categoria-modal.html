<h2 mat-dialog-title>{{ esEdicion ? 'Editar Categoría' : 'Nueva Categoría' }}</h2>

<mat-dialog-content>
  <form [formGroup]="categoriaForm" style="padding-top: 10px;">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre de la Categoría</mat-label>
      <input matInput formControlName="nombre" placeholder="Ej: Postres, Bebidas...">
      @if (f['nombre'].invalid && f['nombre'].touched) {
        <mat-error>El nombre es obligatorio (mínimo 3 letras).</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción (Opcional)</mat-label>
      <textarea matInput formControlName="descripcion" rows="3" placeholder="Ej: Para abrir el apetito..."></textarea>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" style="padding-bottom: 20px; padding-right: 24px;">
  <button class="btn-modal-cancelar" (click)="cancelar()">Cancelar</button>
  <button class="btn-modal-accion" [disabled]="categoriaForm.invalid" (click)="guardar()">
    {{ esEdicion ? 'Actualizar' : 'Crear Categoría' }}
  </button>
</mat-dialog-actions>
